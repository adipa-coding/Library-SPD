<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Rent Book - Library System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .select-group { position: relative; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">සිරි පියරතන දහම් පාසල</a>
        <div class="navbar-links"> <a href="/logout" style="color:#ef4444; font-weight:600;">Logout</a>
            <a href="/books">Books</a>
            <a href="/users">Users</a>
            <a href="/loans/rent">Rent</a>
            <a href="/loans/return">Return</a>
            <a href="/analytics">Analytics</a>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;">
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="card">
            <h1>Rent a Book</h1>
            
            <form th:action="@{/loans/rent}" method="post">
                <div class="form-group">
                    <label for="userId">Student ID</label>
                    <input type="text" id="userId" name="userId" th:value="${param.userId != null ? param.userId[0] : ''}" required placeholder="Ex: spdLib001">
                </div>

                <div class="form-group">
                    <label for="bookId">Book ID</label>
                    <input type="text" id="bookId" name="bookId" required placeholder="Enter Exact Book ID">
                </div>
                
                <div class="form-group">
                    <label for="expectedReturnDate">Expected Return Date</label>
                    <input type="date" id="expectedReturnDate" name="expectedReturnDate">
                    <small style="color: var(--text-muted); display: block; margin-top: 5px;">Leave empty to use the standard 2 weeks period.</small>
                </div>
                
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary">Submit Rental</button>
                    <a href="/" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        // Set default date to today + 14 days
        const dateInput = document.getElementById('expectedReturnDate');
        const defaultDate = new Date();
        defaultDate.setDate(defaultDate.getDate() + 14);
        dateInput.valueAsDate = defaultDate;
    </script>
</body>
</html>
