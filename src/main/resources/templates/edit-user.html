<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile - Library System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">සිරි පියරතන දහම් පාසල</a>
        <div class="navbar-links"> <a href="/logout" style="color:#ef4444; font-weight:600;">Logout</a>
            <a href="/books">Books</a>
            <a href="/users">Users</a>
            <a href="/loans/rent">Rent</a>
            <a href="/loans/return">Return</a>
            <a href="/analytics">Analytics</a>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;">
        <div class="card">
            <h1>Edit Student Profile</h1>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Update information below. The internal Student ID is permanently locked.</p>
            
            <form th:action="@{/users/{id}/edit(id=${user.userId})}" th:object="${user}" method="post">
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label for="userId">Student ID (Locked)</label>
                    <input type="text" id="userId" th:field="*{userId}" readonly style="background: var(--background); color: var(--text-muted); cursor: not-allowed;">
                </div>

                <div class="form-group">
                    <label for="name">Student Name</label>
                    <input type="text" id="name" th:field="*{name}" required>
                </div>
                
                <div class="form-group">
                    <label for="grade">Grade</label>
                    <select id="grade" th:field="*{grade}" required>
                        <option value="1">Grade 1</option>
                        <option value="2">Grade 2</option>
                        <option value="3">Grade 3</option>
                        <option value="4">Grade 4</option>
                        <option value="5">Grade 5</option>
                        <option value="6">Grade 6</option>
                        <option value="7">Grade 7</option>
                        <option value="8">Grade 8</option>
                        <option value="9">Grade 9</option>
                        <option value="10">Grade 10</option>
                        <option value="Final">Grade Final</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="phoneNumber">Phone Number</label>
                    <input type="text" id="phoneNumber" th:field="*{phoneNumber}">
                </div>

                <div class="form-group">
                    <label for="guardianPhoneNumber">Guardian's Phone Number</label>
                    <input type="text" id="guardianPhoneNumber" th:field="*{guardianPhoneNumber}" required>
                </div>
                
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label for="address">Home Address</label>
                    <textarea id="address" th:field="*{address}" rows="3" placeholder="Enter full address..."></textarea>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a th:href="@{/users/{id}(id=${user.userId})}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
