<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Return Book - Library System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">සිරි පියරතන දහම් පාසල</a>
        <div class="navbar-links"> <a href="/logout" style="color:#ef4444; font-weight:600;">Logout</a>
            <a href="/books">Books</a>
            <a href="/users">Users</a>
            <a href="/loans/rent">Rent</a>
            <a href="/loans/return">Return</a>
            <a href="/analytics">Analytics</a>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;">
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <div class="card">
            <h1>Return a Book</h1>
            
            <form th:action="@{/loans/return}" method="post">
                <div class="form-group">
                    <label for="bookIdInput">Scan / Type Book ID</label>
                    <input type="text" id="bookIdInput" placeholder="Enter Exact Book ID">
                </div>
                
                <div style="text-align: center; margin: 15px 0; color: var(--text-muted); font-weight: 500;">OR</div>

                <div class="form-group">
                    <label for="loanId">Select Rented Book</label>
                    <select id="loanId" name="loanId" required>
                        <option value="">-- Select Book to Return --</option>
                        <option th:each="loan : ${activeLoans}" 
                                th:value="${loan.loanId}" 
                                th:data-bookid="${loan.book.bookId}"
                                th:text="${'[' + loan.book.bookId + '] ' + loan.book.title + ' (Rented by ' + loan.user.name + ')'}">
                        </option>
                    </select>
                </div>
                
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary">Process Return</button>
                    <a href="/" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const bookIdInput = document.getElementById('bookIdInput');
            const loanSelect = document.getElementById('loanId');

            bookIdInput.addEventListener('input', (e) => {
                const searchId = e.target.value.trim().toLowerCase();
                let found = false;
                if (searchId) {
                    Array.from(loanSelect.options).forEach(opt => {
                        if (opt.value && opt.dataset.bookid.toLowerCase() === searchId) {
                            loanSelect.value = opt.value;
                            found = true;
                        }
                    });
                }
                if (!found && !searchId) loanSelect.value = '';
            });

            loanSelect.addEventListener('change', (e) => {
                const selectedOpt = loanSelect.options[loanSelect.selectedIndex];
                if (selectedOpt && selectedOpt.value) {
                    bookIdInput.value = selectedOpt.dataset.bookid;
                } else {
                    bookIdInput.value = '';
                }
            });
        });
    </script>
</body>
</html>
